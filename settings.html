<div id="dml-settings" class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
        <b>每日回忆信</b>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down"></div>
    </div>

    <div class="inline-drawer-content">
        <div class="dml-panel">
            <div class="dml-status-card">
                <div>
                    <div class="dml-status-kicker">静默推荐</div>
                    <div id="dml-status-text" class="dml-status-title">正在读取状态...</div>
                    <div id="dml-status-meta" class="dml-status-meta">扩展启动后会在后台检查今天是否已经生成来信。</div>
                </div>
                <button id="dml-view-letter" class="menu_button dml-primary-button" type="button">查看来信</button>
            </div>

            <div id="dml-latest-preview" class="dml-latest-preview">
                <div class="dml-empty">还没有今日来信。你也可以先手动生成一封测试。</div>
            </div>

            <hr class="sysHR" />

            <div class="settings_section">
                <label class="checkbox_label" for="dml-enabled">
                    <input id="dml-enabled" type="checkbox" />
                    启用每日回忆信
                </label>
            </div>

            <div class="settings_section">
                <label class="checkbox_label" for="dml-auto-run">
                    <input id="dml-auto-run" type="checkbox" />
                    启动后静默检查，24 小时内只执行一次
                </label>
            </div>

            <div class="settings_section">
                <label for="dml-api-url">外部 AI URL</label>
                <input id="dml-api-url" class="text_pole" type="text" placeholder="OpenAI 兼容的 /chat/completions 地址，留空则使用本地回忆草稿" />
            </div>

            <div class="settings_section dml-grid">
                <div>
                    <label for="dml-model">模型名</label>
                    <input id="dml-model" class="text_pole" type="text" placeholder="gpt-4.1-mini" />
                </div>
                <div>
                    <label for="dml-inactive-days">不活跃天数</label>
                    <input id="dml-inactive-days" class="text_pole" type="number" min="1" step="1" />
                </div>
            </div>

            <div class="settings_section dml-grid">
                <div>
                    <label for="dml-snippets-per-letter">每封信片段数</label>
                    <input id="dml-snippets-per-letter" class="text_pole" type="number" min="1" max="5" step="1" />
                </div>
                <div>
                    <label for="dml-cooldown-days">同角色冷却天数</label>
                    <input id="dml-cooldown-days" class="text_pole" type="number" min="1" max="90" step="1" />
                </div>
            </div>

            <div class="settings_section">
                <label for="dml-api-key">API Key</label>
                <input id="dml-api-key" class="text_pole" type="password" placeholder="会保存在扩展设置里；如果你的 URL 已经处理鉴权，可以留空" />
                <div id="dml-api-key-status" class="dml-help-text">当前没有保存 API Key。</div>
            </div>

            <div class="settings_section">
                <label for="dml-system-prompt">系统提示词</label>
                <textarea id="dml-system-prompt" class="text_pole textarea_compact" rows="6"></textarea>
            </div>

            <div class="settings_section dml-actions">
                <button id="dml-save-settings" class="menu_button" type="button">保存设置</button>
                <button id="dml-generate-now" class="menu_button" type="button">立即生成</button>
                <button id="dml-clear-api-key" class="menu_button" type="button">清空本地 Key</button>
            </div>

            <div class="dml-help-text">
                纯前端版会直接调用酒馆已有的聊天接口，在后台扫描不活跃角色卡的历史聊天存档，并尽量从不同存档里抽取多个片段，再组合成一封“想让你回去继续聊”的回忆信。
            </div>
        </div>
    </div>
</div>
